name: 友链申请
description: 申请添加友情链接
title: "【友链申请】"
labels: ["友链"]
body:
  - type: input
    id: site_name
    attributes:
      label: 站点名称
      description: 请输入你的站点名称
      placeholder: 例如：我的博客
    validations:
      required: true

  - type: input
    id: site_url
    attributes:
      label: 站点链接
      description: 请输入你的站点 URL（需要 HTTPS）
      placeholder: https://example.com
    validations:
      required: true

  - type: input
    id: site_desc
    attributes:
      label: 站点描述
      description: 请用一句话描述你的站点
      placeholder: 一个关于技术分享的个人博客
    validations:
      required: true

  - type: input
    id: site_avatar
    attributes:
      label: 站点头像
      description: 请输入头像 URL（建议 640x640）
      placeholder: https://example.com/avatar.png
    validations:
      required: true

  - type: dropdown
    id: site_category
    attributes:
      label: 站点类别
      description: 请选择你的站点类别
      options:
        - 个人博客
        - 技术分享
        - 生活记录
        - 学习笔记
        - 作品集
        - 其他
    validations:
      required: true

  - type: textarea
    id: site_content
    attributes:
      label: 站点内容
      description: 请简要描述你站点的主要内容和特色
      placeholder: |
        我的博客主要分享：
        - 前端开发技术
        - 编程学习笔记
        - 开源项目介绍
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: 确认事项
      description: 请确认以下事项
      options:
        - label: 我已将本站添加到我的友链页面
          required: true
        - label: 我的站点支持 HTTPS 访问
          required: true
        - label: 我的站点内容积极向上，无违法违规内容
          required: true
